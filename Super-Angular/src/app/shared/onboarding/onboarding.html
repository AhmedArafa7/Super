<div 
  *ngIf="isOpen()"
  class="fixed inset-0 bg-black/85 backdrop-blur-md flex items-center justify-center p-4 z-[999] animate-in fade-in duration-300 font-sans text-right"
  dir="rtl">
  
  <div 
    class="bg-slate-950 border border-white/10 w-full max-w-lg rounded-[2.5rem] overflow-hidden relative shadow-[0_0_80px_rgba(99,102,241,0.25)] flex flex-col justify-between"
    (click)="$event.stopPropagation()">
    
    <!-- Cinematic Header Visual banner -->
    <div class="relative h-48 flex items-center justify-center overflow-hidden shrink-0">
      <div class="absolute inset-0 bg-gradient-to-b from-indigo-500/20 via-slate-950 to-slate-950"></div>
      
      <div class="relative z-10 flex flex-col items-center gap-4 mt-2">
        <div class="flex items-center gap-4 flex-row-reverse justify-center">
          <div class="size-12 bg-white/5 backdrop-blur-2xl border border-white/10 rounded-2xl flex items-center justify-center shadow-lg transition-transform hover:scale-110">
            <svg lucideIcon="zap" class="size-6 text-indigo-400 animate-pulse"></svg>
          </div>
          <div class="h-8 w-px bg-white/20"></div>
          <div class="size-12 bg-white/5 backdrop-blur-2xl border border-white/10 rounded-2xl flex items-center justify-center shadow-lg transition-transform hover:scale-110">
            <svg lucideIcon="shield-check" class="size-6 text-emerald-400"></svg>
          </div>
        </div>
        <div class="flex items-center gap-2 px-4 py-1 bg-indigo-500/10 border border-indigo-500/20 rounded-full backdrop-blur-md flex-row-reverse">
          <span class="size-1.5 rounded-full bg-indigo-400 animate-ping"></span>
          <span class="text-[9px] uppercase font-black tracking-widest text-indigo-400">establishing neural uplink</span>
        </div>
      </div>
    </div>

    <!-- Active Step Carousel Details -->
    <div class="px-8 pb-8 pt-2 flex-1">
      
      <div class="flex flex-col items-center text-center space-y-4">
        
        <!-- Big Step Icon Indicator -->
        <div 
          [ngClass]="[steps[currentStep()].bg, steps[currentStep()].accent]"
          class="size-20 rounded-[2rem] flex items-center justify-center border shadow-xl transition-all duration-700">
          <svg [lucideIcon]="steps[currentStep()].icon" [ngClass]="steps[currentStep()].color" class="size-10"></svg>
        </div>

        <div class="space-y-2 max-w-sm mx-auto text-center">
          <h3 class="text-xl font-black text-white tracking-tight leading-none pt-2">{{ steps[currentStep()].title }}</h3>
          <p class="text-slate-400 text-xs leading-relaxed font-bold">{{ steps[currentStep()].description }}</p>
        </div>

      </div>

      <!-- Steps progress bar dots -->
      <div class="flex gap-2 justify-center items-center mt-8">
        <button 
          (click)="prev()"
          [disabled]="currentStep() === 0"
          class="h-8 px-3 rounded-lg bg-white/5 border border-white/10 hover:bg-white/10 disabled:opacity-30 text-white text-[10px] font-black transition-all">السابق</button>

        <div class="flex gap-1">
          <div 
            *ngFor="let step of steps; let i = index"
            [ngClass]="i === currentStep() ? 'bg-indigo-500 w-4' : 'bg-white/20 w-1.5'"
            class="h-1.5 rounded-full transition-all duration-300"></div>
        </div>

        <button 
          (click)="next()"
          class="h-8 px-3 rounded-lg bg-white/5 border border-white/10 hover:bg-white/10 text-white text-[10px] font-black transition-all">
          {{ currentStep() === steps.length - 1 ? 'مزامنة' : 'التالي' }}
        </button>
      </div>

      <!-- Action Sync -->
      <div class="mt-8 pt-2">
        <button 
          (click)="complete()"
          class="w-full h-12 bg-indigo-650 hover:bg-indigo-600 text-white rounded-xl font-black text-xs shadow-lg shadow-indigo-500/20 active:scale-95 transition-all flex items-center justify-center gap-2 flex-row-reverse">
          <svg lucideIcon="shield-check" class="size-4"></svg>
          إقرار المزامنة وبدء التشغيل
        </button>
        <p class="text-center text-[7px] text-slate-600 font-bold uppercase tracking-widest mt-3">secured by nexus security protocol v4.2</p>
      </div>

    </div>

  </div>

</div>
