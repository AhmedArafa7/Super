<aside class="flex flex-col h-full border-r border-white/10 bg-slate-900/50 backdrop-blur-xl transition-all duration-300"
       [ngStyle]="{'width': sidebar.isCollapsed() ? '80px' : sidebar.width() + 'px'}">
  
  <div class="h-16 flex items-center justify-between px-4 border-b border-white/10 shrink-0">
    @if (!sidebar.isCollapsed()) {
      <div class="flex items-center gap-3 w-full" [ngClass]="{'flex-row-reverse': true}">
        <div class="w-8 h-8 rounded-lg bg-indigo-500/20 border border-indigo-500/50 flex items-center justify-center shrink-0">
          <svg lucideIcon="zap" class="text-indigo-400 w-[18px] h-[18px]"></svg>
        </div>
        <span class="font-bold text-white text-lg tracking-tight">Nexus OS</span>
      </div>
    } @else {
      <div class="w-full flex justify-center">
        <div class="w-8 h-8 rounded-lg bg-indigo-500/20 border border-indigo-500/50 flex items-center justify-center">
          <svg lucideIcon="zap" class="text-indigo-400 w-[18px] h-[18px]"></svg>
        </div>
      </div>
    }
  </div>

  <div class="flex-1 overflow-y-auto p-2 space-y-1" dir="rtl">
    @for (item of pinnedItems; track item.id) {
      <button class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors hover:bg-white/5"
              [routerLink]="['/' + item.id]"
              routerLinkActive="bg-white/10 text-white font-bold"
              [routerLinkActiveOptions]="{ exact: true }"
              [ngClass]="{'justify-center': sidebar.isCollapsed()}">
        <svg [lucideIcon]="item.icon" class="text-muted-foreground w-5 h-5"></svg>
        @if (!sidebar.isCollapsed()) {
          <span>{{ item.label }}</span>
        }
      </button>
    }
  </div>
  
  <div class="p-4 border-t border-white/10 shrink-0">
     <button class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-colors text-red-400 hover:bg-red-500/10"
             [ngClass]="{'justify-center': sidebar.isCollapsed()}" dir="rtl">
        <svg lucideIcon="log-out" class="w-5 h-5"></svg>
        @if (!sidebar.isCollapsed()) {
          <span>تسجيل الخروج</span>
        }
      </button>
  </div>
</aside>
