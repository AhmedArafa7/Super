<header class="app-header">
  <div class="left-section">
    <!-- Search Bar -->
    <div class="search-container">
      <div class="search-icon-wrapper">
        <lucide-icon [img]="SearchIcon" size="16" class="text-muted"></lucide-icon>
      </div>
      <input type="text" placeholder="البحث في نكسوس..." class="search-input" />
    </div>
  </div>

  <div class="right-section">
    <!-- Toggle Header Button -->
    <button class="icon-button" (click)="toggleHeader()">
      <lucide-icon [img]="ChevronUpIcon" size="20"></lucide-icon>
    </button>
    
    <div class="divider"></div>
    
    <!-- Notifications -->
    <button class="icon-button relative-badge">
      <lucide-icon [img]="BellIcon" size="20"></lucide-icon>
      @if (unreadCount > 0) {
        <span class="badge">{{ unreadCount }}</span>
      }
    </button>
    
    <div class="divider-large"></div>
    
    <!-- Wallet -->
    <button class="wallet-button" (click)="navigateToWallet()">
      <lucide-icon [img]="WalletIcon" size="16" class="text-primary"></lucide-icon>
      رصيد المحفظة
    </button>
  </div>
</header>
